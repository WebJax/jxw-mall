# .github/workflows/issue-agent.yml
#
# Issue Agent – creates and maintains a structured issue plan in GitHub.
#
# Triggers:
#   - Manual dispatch (workflow_dispatch) – run on demand
#   - Push to the plan file on the default branch – keeps issues in sync
#
# Required permissions:
#   issues     : write  – create/update issues and labels
#   contents   : read   – read the plan file from the repo
#
# Optional (for GitHub Projects v2):
#   Set the PROJECT_TOKEN secret to a Personal Access Token with the
#   `project` scope if GITHUB_TOKEN does not have project permissions.
#   Without it the agent will still create labels/milestones/issues but
#   will skip the project board step (and log a warning).
#
# Usage:
#   Go to Actions → "Issue Agent" → Run workflow
#   Or push a change to .github/issue-plan.yml on the default branch.

name: Issue Agent

on:
  workflow_dispatch:
    inputs:
      plan_file:
        description: "Path to the plan YAML file (relative to repo root)"
        required: false
        default: ".github/issue-plan.yml"

  push:
    branches:
      - main
      - master
    paths:
      - ".github/issue-plan.yml"

permissions:
  issues: write
  contents: read

jobs:
  run-agent:
    name: Run Issue Agent
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/issue-agent/package-lock.json

      - name: Install dependencies
        working-directory: scripts/issue-agent
        run: npm ci

      - name: Run Issue Agent
        working-directory: scripts/issue-agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Set PROJECT_TOKEN to a PAT with `project` scope for Projects v2 support.
          # If not set, the agent falls back to GITHUB_TOKEN (may lack project scope).
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          PLAN_FILE: ${{ github.workspace }}/${{ github.event.inputs.plan_file || '.github/issue-plan.yml' }}
        run: node index.js
